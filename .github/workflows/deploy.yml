name: Deploy zu Cloud Run

# Deployt den Service automatisch bei jedem Push auf main.
# Einmalige Einrichtung (2 Secrets): siehe DEPLOY_SETUP.md
# Manuell ausloesbar ueber den "Run workflow"-Knopf (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: |
          gcloud config set project "${{ secrets.GCP_PROJECT }}"
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com artifactregistry.googleapis.com --quiet
          gcloud run deploy genesis-dwg-service --source . --region europe-west3 \
            --allow-unauthenticated --memory 1Gi --timeout 300 --quiet
          echo "===== SERVICE-URL ====="
          gcloud run services describe genesis-dwg-service --region europe-west3 \
            --format='value(status.url)'
